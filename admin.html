<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin — Flowa</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237B2FBE'/><text x='50' y='68' font-size='55' font-weight='bold' font-family='system-ui,sans-serif' fill='white' text-anchor='middle'>F</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black:    #080808;
      --violet:   #7B2FBE;
      --coral:    #FF6B6B;
      --grey:     #333333;
      --light:    #f5f5f7;
      --border:   rgba(0,0,0,0.08);
      --gradient: linear-gradient(135deg, #7B2FBE, #FF6B6B);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      color: var(--black);
      background: var(--light);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ═══ LOGIN ═══ */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(ellipse at top left, rgba(123,47,190,0.08), transparent 50%),
                  radial-gradient(ellipse at bottom right, rgba(255,107,107,0.08), transparent 50%),
                  var(--light);
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
    }
    .login-logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.8px;
      margin-bottom: 6px;
    }
    .login-logo span {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-sub { font-size: 14px; color: #777; margin-bottom: 32px; }
    .login-card label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .login-card input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      margin-bottom: 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafafa;
    }
    .login-card input:focus {
      outline: none;
      border-color: var(--violet);
      box-shadow: 0 0 0 3px rgba(123,47,190,0.12);
      background: #fff;
    }
    .btn-primary {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      background: var(--gradient);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      font-family: inherit;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(123,47,190,0.25); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-error {
      background: #fff0f0;
      border: 1px solid #ffd4d4;
      color: #c0392b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .login-hint {
      font-size: 12px;
      color: #999;
      margin-top: 20px;
      text-align: center;
      line-height: 1.6;
    }

    /* ═══ DASHBOARD ═══ */
    .dashboard { display: none; }
    .dashboard.active { display: block; }

    .topbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.95);
    }
    .topbar-logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .topbar-logo span {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .topbar-user { font-size: 13px; color: #666; }
    .btn-ghost {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--grey);
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-ghost:hover { border-color: var(--violet); color: var(--violet); }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px;
    }

    .dash-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .dash-header h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.8px;
    }
    .dash-header p { font-size: 14px; color: #777; margin-top: 4px; }

    .live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.06);
    }
    .stat-card.active {
      border-color: var(--violet);
      box-shadow: 0 0 0 3px rgba(123,47,190,0.1);
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gradient);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }
    .stat-card:hover::before, .stat-card.active::before { transform: scaleX(1); }
    .stat-label {
      font-size: 12px;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .stat-value.gradient {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-input {
      flex: 1;
      min-width: 220px;
      padding: 11px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
    }
    .search-input:focus { outline: none; border-color: var(--violet); }
    .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--grey);
      transition: all 0.2s;
      font-family: inherit;
    }
    .chip:hover { border-color: var(--violet); color: var(--violet); }
    .chip.active {
      background: var(--gradient);
      color: #fff;
      border-color: transparent;
    }

    .table-wrap {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead {
      background: #fafafa;
      border-bottom: 1px solid var(--border);
    }
    th {
      text-align: left;
      padding: 14px 18px;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td {
      padding: 16px 18px;
      font-size: 14px;
      color: var(--grey);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody tr { transition: background 0.15s; cursor: pointer; }
    tbody tr:hover { background: #fafafa; }
    tbody tr:last-child td { border-bottom: none; }

    .lead-name { font-weight: 600; color: var(--black); }
    .lead-email {
      font-size: 13px;
      color: #777;
      text-decoration: none;
    }
    .lead-email:hover { color: var(--violet); }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-new      { background: #eef2ff; color: #4f46e5; }
    .badge-contacted{ background: #fff7e6; color: #b45309; }
    .badge-won      { background: #ecfdf5; color: #059669; }
    .badge-lost     { background: #fef2f2; color: #b91c1c; }

    .status-select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      background: #fff;
      cursor: pointer;
    }
    .status-select:focus { outline: none; border-color: var(--violet); }

    .empty {
      padding: 60px 20px;
      text-align: center;
      color: #999;
      font-size: 14px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    .loading {
      padding: 60px 20px;
      text-align: center;
      color: #999;
      font-size: 14px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #eee;
      border-top-color: var(--violet);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══ MODAL ═══ */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(8,8,8,0.5);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal-backdrop.active { display: flex; }
    .modal {
      background: #fff;
      border-radius: 20px;
      max-width: 560px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 36px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .modal h2 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #999;
      padding: 4px 8px;
    }
    .modal-close:hover { color: var(--black); }
    .field-row {
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .field-row:last-of-type { border-bottom: none; }
    .field-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      flex-shrink: 0;
      min-width: 110px;
    }
    .field-value {
      font-size: 14px;
      color: var(--black);
      text-align: right;
      word-break: break-word;
    }
    .field-value a { color: var(--violet); text-decoration: none; }

    .notes-area {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      margin-top: 12px;
      background: #fafafa;
    }
    .notes-area:focus { outline: none; border-color: var(--violet); background: #fff; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }
    .modal-actions .btn-primary { flex: 1; }
    .btn-danger {
      padding: 12px 18px;
      background: #fff;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn-danger:hover { background: #fef2f2; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 20px;
      background: var(--black);
      color: #fff;
      border-radius: 12px;
      font-size: 13px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 200;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #059669; }
    .toast.error { background: #b91c1c; }

    @media (max-width: 760px) {
      .container { padding: 20px 16px; }
      .topbar { padding: 14px 18px; }
      .dash-header h1 { font-size: 24px; }
      .stat-value { font-size: 26px; }
      th, td { padding: 12px 10px; font-size: 13px; }
      .hide-mobile { display: none; }
      .modal { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <!-- ═══ LOGIN VIEW ═══ -->
  <div id="loginView" class="login-wrap">
    <div class="login-card">
      <div class="login-logo">Flowa<span>.</span></div>
      <p class="login-sub">Dashboard admin — accès protégé</p>
      <div id="loginError" class="login-error"></div>
      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" placeholder="contact@flowa-agency.com" />
        <label for="password">Mot de passe</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" />
        <button type="submit" class="btn-primary" id="loginBtn">Se connecter</button>
      </form>
      <p class="login-hint">
        Besoin de créer un compte ? Rends-toi sur<br>
        Supabase Dashboard → Authentication → Users → Add user
      </p>
    </div>
  </div>

  <!-- ═══ DASHBOARD VIEW ═══ -->
  <div id="dashboardView" class="dashboard">
    <div class="topbar">
      <div class="topbar-logo">Flowa<span>.</span> <span style="color:#999; font-weight:500; font-size:14px;">/ Admin</span></div>
      <div class="topbar-right">
        <span class="topbar-user" id="userEmail"></span>
        <button class="btn-ghost" id="logoutBtn">Déconnexion</button>
      </div>
    </div>

    <div class="container">
      <div class="dash-header">
        <div>
          <h1>Tes leads</h1>
          <p><span class="live-dot"></span>Temps réel — mis à jour automatiquement</p>
        </div>
        <button class="btn-ghost" id="refreshBtn">↻ Actualiser</button>
      </div>

      <div class="stats" id="statsGrid">
        <div class="stat-card active" data-filter="all">
          <div class="stat-label">Total</div>
          <div class="stat-value gradient" id="statTotal">0</div>
        </div>
        <div class="stat-card" data-filter="new">
          <div class="stat-label">Nouveaux</div>
          <div class="stat-value" id="statNew">0</div>
        </div>
        <div class="stat-card" data-filter="contacted">
          <div class="stat-label">Contactés</div>
          <div class="stat-value" id="statContacted">0</div>
        </div>
        <div class="stat-card" data-filter="won">
          <div class="stat-label">Gagnés</div>
          <div class="stat-value" id="statWon">0</div>
        </div>
        <div class="stat-card" data-filter="lost">
          <div class="stat-label">Perdus</div>
          <div class="stat-value" id="statLost">0</div>
        </div>
      </div>

      <div class="toolbar">
        <input type="text" class="search-input" id="searchInput" placeholder="Rechercher par nom, email, service..." />
      </div>

      <div class="table-wrap">
        <div id="tableContent">
          <div class="loading">
            <div class="spinner"></div>
            Chargement des leads...
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ MODAL DETAIL ═══ -->
  <div class="modal-backdrop" id="leadModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalName">—</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="btn-danger" id="deleteBtn">Supprimer</button>
        <button class="btn-primary" id="saveBtn">Enregistrer</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ═══ CONFIG ═══
    const SUPABASE_URL      = 'https://oixsfogsntqexddjtkae.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_r6Htu6EQriJcxYd82wWmZg_0s37ieHv';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    // ═══ STATE ═══
    const state = {
      leads: [],
      filter: 'all',
      search: '',
      currentLead: null,
      channel: null,
    };

    // ═══ ELEMENTS ═══
    const $ = (id) => document.getElementById(id);
    const loginView  = $('loginView');
    const dashView   = $('dashboardView');
    const loginForm  = $('loginForm');
    const loginErr   = $('loginError');
    const loginBtn   = $('loginBtn');
    const userEmail  = $('userEmail');
    const tableContent = $('tableContent');
    const searchInput  = $('searchInput');
    const leadModal  = $('leadModal');
    const modalName  = $('modalName');
    const modalBody  = $('modalBody');
    const modalClose = $('modalClose');
    const saveBtn    = $('saveBtn');
    const deleteBtn  = $('deleteBtn');
    const logoutBtn  = $('logoutBtn');
    const refreshBtn = $('refreshBtn');

    // ═══ TOAST ═══
    const toastEl = $('toast');
    function toast(msg, type = '') {
      toastEl.textContent = msg;
      toastEl.className = 'toast show ' + type;
      setTimeout(() => toastEl.className = 'toast', 2800);
    }

    // ═══ AUTH ═══
    async function checkSession() {
      const { data } = await sb.auth.getSession();
      if (data.session) {
        showDashboard(data.session.user);
      } else {
        showLogin();
      }
    }

    function showLogin() {
      loginView.style.display = 'flex';
      dashView.classList.remove('active');
    }

    function showDashboard(user) {
      loginView.style.display = 'none';
      dashView.classList.add('active');
      userEmail.textContent = user.email;
      loadLeads();
      subscribeRealtime();
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginErr.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Connexion...';

      const email    = $('email').value.trim();
      const password = $('password').value;

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      loginBtn.disabled = false;
      loginBtn.textContent = 'Se connecter';

      if (error) {
        loginErr.textContent = 'Identifiants invalides. Vérifie ton email et mot de passe.';
        loginErr.style.display = 'block';
        return;
      }
      showDashboard(data.user);
    });

    logoutBtn.addEventListener('click', async () => {
      if (state.channel) { sb.removeChannel(state.channel); state.channel = null; }
      await sb.auth.signOut();
      state.leads = [];
      showLogin();
    });

    // ═══ LOAD LEADS ═══
    async function loadLeads() {
      const { data, error } = await sb
        .from('leads')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        tableContent.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Erreur de chargement : ${error.message}</div>`;
        return;
      }
      state.leads = data || [];
      render();
    }

    refreshBtn.addEventListener('click', () => {
      refreshBtn.textContent = '↻ Chargement...';
      loadLeads().then(() => {
        refreshBtn.textContent = '↻ Actualiser';
        toast('Leads actualisés', 'success');
      });
    });

    // ═══ REALTIME ═══
    function subscribeRealtime() {
      if (state.channel) sb.removeChannel(state.channel);
      state.channel = sb
        .channel('leads-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, (payload) => {
          if (payload.eventType === 'INSERT') {
            state.leads = [payload.new, ...state.leads];
            toast('Nouveau lead reçu ! 🎉', 'success');
          } else if (payload.eventType === 'UPDATE') {
            state.leads = state.leads.map(l => l.id === payload.new.id ? payload.new : l);
          } else if (payload.eventType === 'DELETE') {
            state.leads = state.leads.filter(l => l.id !== payload.old.id);
          }
          render();
        })
        .subscribe();
    }

    // ═══ RENDER ═══
    function getFiltered() {
      let list = state.leads;
      if (state.filter !== 'all') list = list.filter(l => l.status === state.filter);
      if (state.search) {
        const q = state.search.toLowerCase();
        list = list.filter(l =>
          (l.first_name || '').toLowerCase().includes(q) ||
          (l.last_name  || '').toLowerCase().includes(q) ||
          (l.email      || '').toLowerCase().includes(q) ||
          (l.service    || '').toLowerCase().includes(q) ||
          (l.budget     || '').toLowerCase().includes(q)
        );
      }
      return list;
    }

    function statusBadge(status) {
      const labels = { new: 'Nouveau', contacted: 'Contacté', won: 'Gagné', lost: 'Perdu' };
      return `<span class="badge badge-${status}">${labels[status] || status}</span>`;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const today = new Date();
      const diffMs = today - d;
      const diffH  = Math.floor(diffMs / (1000 * 60 * 60));
      if (diffH < 1) return 'Il y a quelques minutes';
      if (diffH < 24) return `Il y a ${diffH}h`;
      if (diffH < 48) return 'Hier';
      return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function updateStats() {
      const all = state.leads;
      $('statTotal').textContent     = all.length;
      $('statNew').textContent       = all.filter(l => l.status === 'new').length;
      $('statContacted').textContent = all.filter(l => l.status === 'contacted').length;
      $('statWon').textContent       = all.filter(l => l.status === 'won').length;
      $('statLost').textContent      = all.filter(l => l.status === 'lost').length;
    }

    function render() {
      updateStats();
      const list = getFiltered();

      if (list.length === 0) {
        tableContent.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📭</div>
            ${state.leads.length === 0 ? 'Aucun lead pour le moment. Ils apparaîtront ici en temps réel.' : 'Aucun lead ne correspond à ta recherche.'}
          </div>`;
        return;
      }

      const rows = list.map(l => `
        <tr data-id="${l.id}">
          <td>
            <div class="lead-name">${escapeHtml(l.first_name || '')} ${escapeHtml(l.last_name || '')}</div>
            <a href="mailto:${escapeHtml(l.email)}" class="lead-email" onclick="event.stopPropagation()">${escapeHtml(l.email)}</a>
          </td>
          <td class="hide-mobile">${escapeHtml(l.service || '—')}</td>
          <td class="hide-mobile">${escapeHtml(l.budget || '—')}</td>
          <td>${statusBadge(l.status || 'new')}</td>
          <td class="hide-mobile" style="color:#888; font-size:13px;">${formatDate(l.created_at)}</td>
        </tr>
      `).join('');

      tableContent.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Contact</th>
              <th class="hide-mobile">Service</th>
              <th class="hide-mobile">Budget</th>
              <th>Statut</th>
              <th class="hide-mobile">Date</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;

      tableContent.querySelectorAll('tbody tr').forEach(tr => {
        tr.addEventListener('click', () => {
          const lead = state.leads.find(l => l.id === tr.dataset.id);
          if (lead) openModal(lead);
        });
      });
    }

    // ═══ FILTERS ═══
    document.querySelectorAll('.stat-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        state.filter = card.dataset.filter;
        render();
      });
    });

    searchInput.addEventListener('input', (e) => {
      state.search = e.target.value;
      render();
    });

    // ═══ MODAL ═══
    function openModal(lead) {
      state.currentLead = lead;
      modalName.textContent = `${lead.first_name || ''} ${lead.last_name || ''}`.trim() || 'Lead';

      modalBody.innerHTML = `
        <div class="field-row">
          <div class="field-label">Email</div>
          <div class="field-value"><a href="mailto:${escapeHtml(lead.email)}">${escapeHtml(lead.email)}</a></div>
        </div>
        <div class="field-row">
          <div class="field-label">Téléphone</div>
          <div class="field-value">${lead.phone ? `<a href="tel:${escapeHtml(lead.phone)}">${escapeHtml(lead.phone)}</a>` : '—'}</div>
        </div>
        <div class="field-row">
          <div class="field-label">Service</div>
          <div class="field-value">${escapeHtml(lead.service || '—')}</div>
        </div>
        <div class="field-row">
          <div class="field-label">Budget</div>
          <div class="field-value">${escapeHtml(lead.budget || '—')}</div>
        </div>
        <div class="field-row">
          <div class="field-label">Message</div>
          <div class="field-value" style="text-align:left; max-width:60%;">${escapeHtml(lead.message || '—')}</div>
        </div>
        <div class="field-row">
          <div class="field-label">Reçu le</div>
          <div class="field-value">${new Date(lead.created_at).toLocaleString('fr-FR')}</div>
        </div>
        <div class="field-row">
          <div class="field-label">Statut</div>
          <div class="field-value">
            <select class="status-select" id="modalStatus">
              <option value="new">Nouveau</option>
              <option value="contacted">Contacté</option>
              <option value="won">Gagné</option>
              <option value="lost">Perdu</option>
            </select>
          </div>
        </div>
        <div>
          <div class="field-label" style="margin-top:16px;">Notes internes</div>
          <textarea class="notes-area" id="modalNotes" placeholder="Ajoute une note sur ce lead...">${escapeHtml(lead.notes || '')}</textarea>
        </div>
      `;

      $('modalStatus').value = lead.status || 'new';
      leadModal.classList.add('active');
    }

    function closeModal() {
      leadModal.classList.remove('active');
      state.currentLead = null;
    }

    modalClose.addEventListener('click', closeModal);
    leadModal.addEventListener('click', (e) => {
      if (e.target === leadModal) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && leadModal.classList.contains('active')) closeModal();
    });

    // ═══ SAVE ═══
    saveBtn.addEventListener('click', async () => {
      if (!state.currentLead) return;
      const newStatus = $('modalStatus').value;
      const newNotes  = $('modalNotes').value;

      saveBtn.disabled = true;
      saveBtn.textContent = 'Enregistrement...';

      const { error } = await sb
        .from('leads')
        .update({ status: newStatus, notes: newNotes })
        .eq('id', state.currentLead.id);

      saveBtn.disabled = false;
      saveBtn.textContent = 'Enregistrer';

      if (error) {
        toast('Erreur : ' + error.message, 'error');
        return;
      }
      toast('Lead mis à jour', 'success');
      closeModal();
    });

    // ═══ DELETE ═══
    deleteBtn.addEventListener('click', async () => {
      if (!state.currentLead) return;
      if (!confirm('Supprimer définitivement ce lead ? Cette action est irréversible.')) return;

      const { error } = await sb
        .from('leads')
        .delete()
        .eq('id', state.currentLead.id);

      if (error) {
        toast('Erreur : ' + error.message, 'error');
        return;
      }
      toast('Lead supprimé', 'success');
      closeModal();
    });

    // ═══ BOOT ═══
    checkSession();
  </script>
</body>
</html>
